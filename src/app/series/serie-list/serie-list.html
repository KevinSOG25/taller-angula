<div class="container mt-4">
  <h2>Lista de Series</h2>
  <div class="row">
    <div class="col-md-8">
      <table class="table table-striped table-hover">
        <thead class="table-dark">
          <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Canal</th>
            <th>Temporadas</th>
            <th>Descripcion</th>
            <th>Pagina Web</th>
            <th>Poster</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let s of series">
            <td>{{ s.id }}</td>
            <td><a href="#" (click)="selectSerie(s); $event.preventDefault()">{{ s.name }}</a></td>
            <td>{{ s.channel }}</td>
            <td [class.text-danger]="s.seasons > 6">{{ s.seasons }}</td>
            <td>{{ s.description }}</td>
            <td><a [href]="s.webpage" target="_blank" class="btn btn-link">Visitar</a></td>
            <td><img [src]="s.poster" [alt]="s.name" class="img-thumbnail" style="width: 80px;" /></td>
          </tr>
        </tbody>
      </table>
      <p><strong>Promedio de temporadas:</strong> {{ averageSeasons | number:'1.2-2' }}</p>
    </div>
    <div class="col-md-4" *ngIf="selectedSerie">
      <div class="card">
        <img [src]="selectedSerie.poster" class="card-img-top" [alt]="selectedSerie.name" />
        <div class="card-body">
          <h5 class="card-title">{{ selectedSerie.name }}</h5>
          <p class="card-text">{{ selectedSerie.description }}</p>
          <a [href]="selectedSerie.webpage" target="_blank" class="btn btn-primary">Visitar Pagina</a>
        </div>
      </div>
    </div>
  </div>
</div>
