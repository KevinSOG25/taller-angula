<div class="container mt-4">
  <h2>Lista de Series</h2>
  <table class="table table-striped table-hover">
    <thead class="table-dark">
      <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Canal</th>
        <th>Temporadas</th>
        <th>Descripcion</th>
        <th>Pagina Web</th>
        <th>Poster</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let s of series">
        <td>{{ s.id }}</td>
        <td>{{ s.name }}</td>
        <td>{{ s.channel }}</td>
        <td>{{ s.seasons }}</td>
        <td>{{ s.description }}</td>
        <td><a [href]="s.webpage" target="_blank" class="btn btn-link">Visitar</a></td>
        <td><img [src]="s.poster" [alt]="s.name" class="img-thumbnail" style="width: 80px;" /></td>
      </tr>
    </tbody>
  </table>
</div>
